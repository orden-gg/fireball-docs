name: Documentation Improvement
description: Suggest improvements to existing documentation
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Help us improve the documentation!

  - type: input
    id: page
    attributes:
      label: Page URL
      description: Which page needs improvement?
      placeholder: https://codex.fireball.gg/...
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: What's the issue?
      description: What's unclear, incorrect, or missing?
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Improvement
      description: How would you improve it?
    validations:
      required: true
